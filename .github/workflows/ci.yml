name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test Suite
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.os == 'ubuntu-22.04' && matrix.rust == 'beta' }}
    strategy:
      matrix:
        os: [ubuntu-22.04, windows-latest, macos-latest]
        rust: [stable, beta]
        exclude:
          - os: windows-latest
            rust: beta
          - os: macos-latest
            rust: beta

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@master
      with:
        toolchain: ${{ matrix.rust }}
        components: rustfmt, clippy

    - name: Install system dependencies (Ubuntu)
      if: matrix.os == 'ubuntu-22.04'
      run: |
        echo "Updating package lists..."
        sudo apt-get update --fix-missing
        echo "Installing system dependencies..."
        sudo apt-get install -y --no-install-recommends \
          libwebkit2gtk-4.1-dev \
          build-essential \
          curl \
          wget \
          file \
          libxdo-dev \
          libssl-dev \
          libayatana-appindicator3-dev \
          librsvg2-dev \
          libudev-dev \
          libdbus-1-dev \
          pkg-config
        echo "System dependencies installed successfully"

    - name: Install system dependencies (macOS)
      if: matrix.os == 'macos-latest'
      run: |
        # Install any missing macOS dependencies
        brew install pkg-config || true

    - name: Setup Node.js
      if: matrix.rust == 'stable'
      uses: actions/setup-node@v4
      with:
        node-version: 'lts/*'
        cache: 'npm'
        cache-dependency-path: ui/package-lock.json

    - name: Install frontend dependencies
      if: matrix.rust == 'stable'
      run: |
        echo "Installing frontend dependencies..."
        cd ui && npm ci

    - name: Install Tauri CLI
      if: matrix.rust == 'stable'
      run: npm install -g @tauri-apps/cli@v2

    - name: Cache cargo registry
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-${{ matrix.rust }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-${{ matrix.rust }}-cargo-
          ${{ runner.os }}-cargo-

    - name: Check formatting
      run: |
        echo "Checking code formatting..."
        cargo fmt --all -- --check

    - name: Run clippy (CLI)
      if: matrix.rust == 'beta'
      run: |
        echo "Running clippy lints (CLI only)..."
        cargo clippy --all-targets --no-default-features --features cli-only -- -D warnings

    - name: Run clippy (GUI)
      if: matrix.rust == 'stable'
      run: |
        echo "Running clippy lints (GUI)..."
        cargo clippy --all-targets --features tauri-gui -- -D warnings

    - name: Run tests
      run: |
        echo "Running unit tests..."
        cargo test --verbose --no-default-features --features cli-only

    - name: Run all-features tests (Linux)
      if: matrix.os == 'ubuntu-22.04' && matrix.rust == 'stable'
      run: |
        echo "Running full all-features test matrix on Linux..."
        cargo test --all-features --verbose

    - name: Run tests with GUI features
      if: matrix.rust == 'stable'
      run: |
        echo "Running GUI feature tests..."
        cargo test --features tauri-gui --verbose

    - name: Build CLI version
      run: |
        echo "Building CLI version..."
        cargo build --release --features cli-only

    - name: Run clippy (all features, Linux)
      if: matrix.os == 'ubuntu-22.04' && matrix.rust == 'stable'
      run: |
        echo "Running all-features clippy on Linux..."
        cargo clippy --all-targets --all-features -- -D warnings

    - name: Build frontend
      if: matrix.rust == 'stable'
      run: |
        echo "Building frontend..."
        cd ui && npm run build

    - name: Verify icon configuration
      if: matrix.rust == 'stable'
      run: |
        echo "Verifying icon configuration..."
        chmod +x scripts/verify-icons.sh
        ./scripts/verify-icons.sh

    - name: Build GUI version
      if: matrix.rust == 'stable'
      run: |
        echo "Building GUI version..."
        cargo build --release --features tauri-gui

    - name: Test Tauri build (macOS only)
      if: matrix.rust == 'stable' && matrix.os == 'macos-latest'
      run: |
        echo "Testing Tauri app bundle creation..."
        tauri build --features tauri-gui

        # Verify app bundle was created
        if find target -name "*.app" -type d | head -1 | grep -q ".app"; then
          app_path=$(find target -name "*.app" -type d | head -1)
          echo "✅ App bundle created: $app_path"

          # Check icon embedding
          if [[ -f "$app_path/Contents/Resources/icon.icns" ]]; then
            icon_size=$(du -h "$app_path/Contents/Resources/icon.icns" | cut -f1)
            echo "✅ App icon embedded: $icon_size"
          else
            echo "❌ App icon missing"
            exit 1
          fi
        else
          echo "❌ No app bundle created"
          exit 1
        fi

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Install cargo-audit
      run: cargo install cargo-audit

    - name: Run security audit
      run: cargo audit

  coverage:
    name: Code Coverage
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Install system dependencies
      run: |
        echo "Updating package lists..."
        sudo apt-get update --fix-missing
        echo "Installing system dependencies for coverage..."
        sudo apt-get install -y --no-install-recommends \
          libwebkit2gtk-4.1-dev \
          build-essential \
          curl \
          wget \
          file \
          libxdo-dev \
          libssl-dev \
          libayatana-appindicator3-dev \
          librsvg2-dev \
          libudev-dev \
          libdbus-1-dev \
          pkg-config
        echo "System dependencies installed successfully"

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 'lts/*'
        cache: 'npm'
        cache-dependency-path: ui/package-lock.json

    - name: Install frontend dependencies
      run: |
        echo "Installing frontend dependencies..."
        cd ui && npm ci

    - name: Build frontend
      run: |
        echo "Building frontend..."
        cd ui && npm run build

    - name: Install tarpaulin
      run: cargo install cargo-tarpaulin

    - name: Generate code coverage
      run: cargo tarpaulin --verbose --features tauri-gui --workspace --timeout 120 --out xml

    - name: Upload coverage artifact
      uses: actions/upload-artifact@v4
      with:
        name: coverage-cobertura
        path: cobertura.xml

  docs:
    name: Documentation
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Install minimal system dependencies (for CLI docs)
      run: |
        echo "Updating package lists..."
        sudo apt-get update --fix-missing
        echo "Installing libdbus-1-dev, libudev-dev and pkg-config for CLI docs..."
        sudo apt-get install -y --no-install-recommends libdbus-1-dev libudev-dev pkg-config

    - name: Generate docs (CLI features)
      run: cargo doc --no-deps --no-default-features --features cli-only

    # Optional: also validate GUI docs; requires system deps
    - name: Install system dependencies (for GUI docs)
      run: |
        echo "Updating package lists..."
        sudo apt-get update --fix-missing
        echo "Installing system dependencies for Tauri docs..."
        sudo apt-get install -y --no-install-recommends \
          libwebkit2gtk-4.0-dev \
          libwebkit2gtk-4.1-dev \
          libjavascriptcoregtk-4.0-dev \
          libjavascriptcoregtk-4.1-dev \
          libgtk-3-dev \
          libayatana-appindicator3-dev \
          librsvg2-dev \
          libudev-dev \
          libdbus-1-dev \
          pkg-config \
          build-essential \
          libssl-dev \
          libsoup2.4-dev \
          libsoup-3.0-dev

    - name: Generate docs (GUI features)
      run: cargo doc --no-deps --features tauri-gui

    - name: Install cargo-tarpaulin
      run: cargo install cargo-tarpaulin

    - name: Generate code coverage
      run: cargo tarpaulin --out xml --output-dir . --no-default-features --features cli-only

    - name: Generate Coverage Summary
      uses: irongut/CodeCoverageSummary@v1.3.0
      with:
        filename: cobertura.xml
        fail_below_min: false
        format: markdown
        output: both

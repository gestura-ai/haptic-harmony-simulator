name: Package Managers

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish from (for example v0.1.0)'
        required: true
        default: 'v0.1.0'

permissions:
  contents: read

jobs:
  metadata:
    name: Resolve release metadata
    runs-on: ubuntu-22.04
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - name: Resolve tag and version
        id: meta
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "release" ]]; then
            TAG="${{ github.event.release.tag_name }}"
          else
            TAG="${{ github.event.inputs.tag }}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

  homebrew:
    name: Publish Homebrew formula
    needs: metadata
    if: ${{ secrets.HOMEBREW_TAP_TOKEN != '' }}
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update Homebrew formula
        uses: mislav/bump-homebrew-formula-action@v3
        with:
          formula-name: haptic-harmony-simulator
          formula-path: packaging/homebrew/haptic-harmony-simulator.rb
          homebrew-tap: gestura-ai/homebrew-tap
          base-branch: main
          download-url: https://github.com/${{ github.repository }}/releases/download/${{ needs.metadata.outputs.tag }}/haptic-harmony-simulation-macos-x64.dmg
          commit-message: 'feat(homebrew): update haptic-harmony-simulator to ${{ needs.metadata.outputs.version }}'
        env:
          COMMITTER_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

  chocolatey:
    name: Publish Chocolatey package
    needs: metadata
    if: ${{ secrets.CHOCOLATEY_API_KEY != '' }}
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Chocolatey tools
        shell: pwsh
        run: choco install chocolatey-core.extension -y

      - name: Prepare package files
        shell: pwsh
        env:
          VERSION: ${{ needs.metadata.outputs.version }}
          TAG: ${{ needs.metadata.outputs.tag }}
        run: |
          New-Item -ItemType Directory -Force -Path chocolatey\tools | Out-Null
          @"
          $ErrorActionPreference = 'Stop'
          $packageArgs = @{
            packageName = 'haptic-harmony-simulator'
            softwareName = 'Haptic Harmony Simulator*'
            fileType = 'exe'
            url64bit = 'https://github.com/${{ github.repository }}/releases/download/$env:TAG/haptic-harmony-simulation-windows-x64.exe'
            silentArgs = '/S'
            validExitCodes = @(0)
          }
          Install-ChocolateyPackage @packageArgs
          "@ | Set-Content chocolatey\tools\chocolateyinstall.ps1

          @"
          <?xml version="1.0"?>
          <package>
            <metadata>
              <id>haptic-harmony-simulator</id>
              <version>$env:VERSION</version>
              <authors>Gestura</authors>
              <description>Haptic Harmony Ring Simulator for developers.</description>
              <projectUrl>https://github.com/${{ github.repository }}</projectUrl>
              <tags>gestura haptics simulator tauri</tags>
            </metadata>
          </package>
          "@ | Set-Content chocolatey\haptic-harmony-simulator.nuspec

      - name: Pack Chocolatey package
        shell: pwsh
        working-directory: chocolatey
        run: choco pack

      - name: Push Chocolatey package
        shell: pwsh
        env:
          CHOCOLATEY_API_KEY: ${{ secrets.CHOCOLATEY_API_KEY }}
        working-directory: chocolatey
        run: choco push *.nupkg --source https://push.chocolatey.org/ --api-key "$env:CHOCOLATEY_API_KEY"

  winget:
    name: Publish Winget manifest
    needs: metadata
    if: ${{ secrets.WINGET_TOKEN != '' }}
    runs-on: windows-latest
    steps:
      - name: Publish to Winget
        uses: vedantmgoyal2009/winget-releaser@v2
        with:
          identifier: Gestura.HapticHarmonySimulator
          version: ${{ needs.metadata.outputs.version }}
          installers-regex: 'haptic-harmony-simulation-windows-x64\.(exe|msi)$'
          token: ${{ secrets.WINGET_TOKEN }}

  snapcraft:
    name: Publish Snap package
    needs: metadata
    if: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS != '' }}
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build and publish snap
        uses: snapcore/action-build@v1
        id: snapcraft

      - name: Upload to Snap Store
        uses: snapcore/action-publish@v1
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
        with:
          snap: ${{ steps.snapcraft.outputs.snap }}
          release: stable
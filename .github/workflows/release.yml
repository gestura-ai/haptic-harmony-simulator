name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (for example v0.1.0)'
        required: true
        default: 'v0.1.0'

permissions:
  contents: write

concurrency:
  group: release-${{ github.workflow }}-${{ github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  prepare:
    name: Prepare release metadata
    runs-on: ubuntu-22.04
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate tag and version metadata
        id: meta
        env:
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail

          python3 <<'PY'
          import json
          import os
          import pathlib
          import re
          import tomllib

          cargo = tomllib.loads(pathlib.Path('Cargo.toml').read_text())
          tauri = json.loads(pathlib.Path('tauri.conf.json').read_text())
          cargo_version = cargo['package']['version']
          tauri_version = tauri['version']
          tag = os.environ['TAG']

          if not re.fullmatch(r'v[0-9]+\.[0-9]+\.[0-9]+(?:[-+][0-9A-Za-z.-]+)?', tag):
              raise SystemExit(f'Invalid release tag format: {tag}')
          if cargo_version != tauri_version:
              raise SystemExit(
                  f'Cargo.toml version ({cargo_version}) does not match tauri.conf.json version ({tauri_version})'
              )
          if tag != f'v{cargo_version}':
              raise SystemExit(f'Tag {tag} does not match project version v{cargo_version}')
          PY

          PRERELEASE=false
          if [[ "$TAG" == *-* ]]; then
            PRERELEASE=true
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"

  validate:
    name: Validate ${{ matrix.label }} release surface
    needs: prepare
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            label: Linux
            platform: linux
          - runner: windows-latest
            label: Windows
            platform: windows
          - runner: macos-13
            label: macOS
            platform: macos
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rust cache
        uses: swatinem/rust-cache@v2

      - name: Install Linux system dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            libdbus-1-dev \
            librsvg2-dev \
            libssl-dev \
            libudev-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf \
            pkg-config \
            rpm \
            wget

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: ui

      - name: Build frontend
        run: npm run build
        working-directory: ui

      - name: Check formatting
        if: matrix.platform == 'linux'
        run: cargo fmt --all -- --check

      - name: Run clippy (CLI)
        run: cargo clippy --all-targets --no-default-features --features cli-only -- -D warnings

      - name: Run tests (CLI)
        run: cargo test --no-default-features --features cli-only --verbose

      - name: Run clippy (GUI)
        run: cargo clippy --all-targets --features tauri-gui -- -D warnings

      - name: Run tests (GUI)
        run: cargo test --features tauri-gui --verbose

      - name: Build GUI binary
        run: cargo build --release --features tauri-gui

      - name: Run Linux all-features tests
        if: matrix.platform == 'linux'
        run: cargo test --all-features --verbose

      - name: Run Linux all-features clippy
        if: matrix.platform == 'linux'
        run: cargo clippy --all-targets --all-features -- -D warnings

  package:
    name: Package ${{ matrix.display_name }}
    needs: [prepare, validate]
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            platform: linux
            display_name: Linux x64
            target: x86_64-unknown-linux-gnu
            arch: x64
            bundles: appimage,deb,rpm
          - runner: windows-latest
            platform: windows
            display_name: Windows x64
            target: x86_64-pc-windows-msvc
            arch: x64
            bundles: nsis,msi
          - runner: macos-13
            platform: macos
            display_name: macOS x64
            target: x86_64-apple-darwin
            arch: x64
            bundles: dmg
          - runner: macos-14
            platform: macos
            display_name: macOS arm64
            target: aarch64-apple-darwin
            arch: arm64
            bundles: dmg
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            libdbus-1-dev \
            librsvg2-dev \
            libssl-dev \
            libudev-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf \
            pkg-config \
            rpm \
            wget

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: ui

      - name: Build frontend
        run: npm run build
        working-directory: ui

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli@v2

      - name: Verify icon configuration
        run: ./scripts/verify-icons.sh

      - name: Require macOS signing secrets
        if: matrix.platform == 'macos'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          for secret_name in APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD APPLE_SIGNING_IDENTITY APPLE_ID APPLE_PASSWORD APPLE_TEAM_ID; do
            if [[ -z "${!secret_name:-}" ]]; then
              echo "Missing required macOS signing secret: ${secret_name}" >&2
              exit 1
            fi
          done

      - name: Import Apple developer certificate
        if: matrix.platform == 'macos'
        uses: apple-actions/import-codesign-certs@v2
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Require Windows signing secrets
        if: matrix.platform == 'windows'
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE) -or [string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE_PASSWORD)) {
            throw 'Missing WINDOWS_CERTIFICATE or WINDOWS_CERTIFICATE_PASSWORD secret.'
          }

      - name: Import Windows signing certificate
        if: matrix.platform == 'windows'
        id: windows_cert
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          New-Item -ItemType Directory -Force -Path certificate | Out-Null
          Set-Content -Path certificate\tempCert.txt -Value $env:WINDOWS_CERTIFICATE
          certutil -decode certificate\tempCert.txt certificate\certificate.pfx | Out-Null
          Remove-Item certificate\tempCert.txt

          $password = ConvertTo-SecureString -String $env:WINDOWS_CERTIFICATE_PASSWORD -Force -AsPlainText
          $imported = Import-PfxCertificate -FilePath certificate\certificate.pfx -CertStoreLocation Cert:\CurrentUser\My -Password $password
          if (-not $imported) {
            throw 'Failed to import Windows signing certificate.'
          }

          "thumbprint=$($imported.Thumbprint)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Patch Windows Tauri signing thumbprint
        if: matrix.platform == 'windows'
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE_THUMBPRINT: ${{ steps.windows_cert.outputs.thumbprint }}
        run: |
          $config = Get-Content tauri.conf.json -Raw | ConvertFrom-Json
          $config.bundle.windows.certificateThumbprint = $env:WINDOWS_CERTIFICATE_THUMBPRINT
          $config | ConvertTo-Json -Depth 100 | Set-Content tauri.conf.json

      - name: Build signed Tauri bundles
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: tauri build --target ${{ matrix.target }} --features tauri-gui --bundles ${{ matrix.bundles }}

      - name: Verify macOS signatures
        if: matrix.platform == 'macos'
        run: |
          set -euo pipefail
          APP_PATH=$(find target -path '*/bundle/*' -name '*.app' -type d | head -1)
          DMG_PATH=$(find target -path '*/bundle/*' -name '*.dmg' -type f | head -1)

          test -n "$APP_PATH"
          test -n "$DMG_PATH"

          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          codesign --verify --verbose=2 "$DMG_PATH"
          spctl --assess --type open --context context:primary-signature --verbose=2 "$DMG_PATH"

      - name: Verify Windows signatures
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $nsis = Get-ChildItem -Path target -Recurse -Filter *.exe | Where-Object { $_.FullName -match '\\bundle\\nsis\\' } | Select-Object -First 1
          $msi = Get-ChildItem -Path target -Recurse -Filter *.msi | Where-Object { $_.FullName -match '\\bundle\\(msi|wix)\\' } | Select-Object -First 1

          if (-not $nsis) { throw 'NSIS installer was not produced.' }
          if (-not $msi) { throw 'MSI installer was not produced.' }

          $nsisSig = Get-AuthenticodeSignature -FilePath $nsis.FullName
          $msiSig = Get-AuthenticodeSignature -FilePath $msi.FullName

          if ($nsisSig.Status -ne 'Valid') { throw "NSIS signature is $($nsisSig.Status): $($nsisSig.StatusMessage)" }
          if ($msiSig.Status -ne 'Valid') { throw "MSI signature is $($msiSig.Status): $($msiSig.StatusMessage)" }

      - name: Verify Linux bundles
        if: matrix.platform == 'linux'
        run: |
          set -euo pipefail
          find target -path '*/bundle/*' -name '*.AppImage' -type f | head -1 >/dev/null
          find target -path '*/bundle/*' -name '*.deb' -type f | head -1 >/dev/null

      - name: Collect release assets
        run: |
          python scripts/collect_release_assets.py \
            --platform ${{ matrix.platform }} \
            --arch ${{ matrix.arch }} \
            --target ${{ matrix.target }} \
            --output-dir dist/release/${{ matrix.platform }}-${{ matrix.arch }}

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}-${{ matrix.arch }}
          path: dist/release/${{ matrix.platform }}-${{ matrix.arch }}

  publish:
    name: Publish GitHub release
    needs: [prepare, package]
    runs-on: ubuntu-22.04
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: dist/release

      - name: Generate SHA256 manifest
        run: |
          set -euo pipefail
          cd dist/release
          sha256sum * > haptic-harmony-simulation-SHA256SUMS.txt
          ls -la

      - name: Create or update GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.prepare.outputs.tag }}
          PRERELEASE: ${{ needs.prepare.outputs.prerelease }}
        run: |
          set -euo pipefail

          title="Haptic Harmony Simulator ${TAG}"
          mapfile -t assets < <(find dist/release -maxdepth 1 -type f | sort)

          prerelease_flag=()
          if [[ "$PRERELEASE" == "true" ]]; then
            prerelease_flag+=(--prerelease)
          fi

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "${assets[@]}" --clobber
          else
            gh release create "$TAG" "${assets[@]}" \
              --title "$title" \
              --generate-notes \
              "${prerelease_flag[@]}"
          fi
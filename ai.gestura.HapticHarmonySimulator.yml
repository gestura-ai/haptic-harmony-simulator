app-id: ai.gestura.HapticHarmonySimulator
runtime: org.freedesktop.Platform
runtime-version: '23.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: haptic-harmony-simulation
finish-args:
  # Network access for BLE simulation
  - --share=network
  # Bluetooth access
  - --allow=bluetooth
  # Audio access for haptic feedback
  - --socket=pulseaudio
  # GUI access
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc
  # OpenGL for hardware acceleration
  - --device=dri
  # File system access
  - --filesystem=home:ro
  - --filesystem=xdg-documents
  # System information access
  - --system-talk-name=org.freedesktop.UPower
  - --system-talk-name=org.bluez

modules:
  - name: haptic-harmony-simulator
    buildsystem: simple
    build-options:
      append-path: /usr/lib/sdk/rust-stable/bin
      env:
        CARGO_HOME: /run/build/haptic-harmony-simulator/cargo
        RUST_BACKTRACE: '1'
    build-commands:
      # Build the application with Tauri GUI features
      - cargo build --release --features tauri-gui
      # Install the binary
      - install -Dm755 target/release/haptic-harmony-simulation /app/bin/haptic-harmony-simulation
      # Install desktop file
      - install -Dm644 packaging/flatpak/ai.gestura.HapticHarmonySimulator.desktop /app/share/applications/ai.gestura.HapticHarmonySimulator.desktop
      # Install icons
      - install -Dm644 icons/16x16.png /app/share/icons/hicolor/16x16/apps/ai.gestura.HapticHarmonySimulator.png
      - install -Dm644 icons/32x32.png /app/share/icons/hicolor/32x32/apps/ai.gestura.HapticHarmonySimulator.png
      - install -Dm644 icons/64x64.png /app/share/icons/hicolor/64x64/apps/ai.gestura.HapticHarmonySimulator.png
      - install -Dm644 icons/128x128.png /app/share/icons/hicolor/128x128/apps/ai.gestura.HapticHarmonySimulator.png
      - install -Dm644 icons/256x256.png /app/share/icons/hicolor/256x256/apps/ai.gestura.HapticHarmonySimulator.png
      - install -Dm644 icons/512x512.png /app/share/icons/hicolor/512x512/apps/ai.gestura.HapticHarmonySimulator.png
      # Install AppStream metadata
      - install -Dm644 packaging/flatpak/ai.gestura.HapticHarmonySimulator.metainfo.xml /app/share/metainfo/ai.gestura.HapticHarmonySimulator.metainfo.xml
    sources:
      - type: dir
        path: .
